<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste</title>
    <style>
      body { font-family: 'Segoe UI', sans-serif; margin: 0; background: url('https://i.pinimg.com/originals/9e/47/fe/9e47fefa5a687335cf906882cecfe779.gif') repeat center center fixed; background-size: cover; color: #333; }
    
header { background: rgba(0, 0, 0, 0.5); color: rgb(0, 0, 0); padding: 2rem; text-align: center; }
.container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
        .cat-image {
            display: block;
            width: 120px;
            height: 120px;
            margin: 1.5rem auto;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 8px 18px rgba(0,0,0,0.25);
        }
        
        
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: rgba(0, 0, 0, 0.5); border-radius: 8px; padding: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card h3 { margin-top: 0; color: white; }
        .card p { color: white; }
        .btn-abrir { background: #ed6d93; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; width: 100%; }

        
        #preview-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 1000; 
        }
        #preview-content { position: relative; width: 90%; height: 85%; margin: 2% auto; background: white; border-radius: 10px; overflow: hidden; }
        .close-btn { position: absolute; top: 10px; right: 20px; font-size: 30px; cursor: pointer; color: #ffffff; z-index: 1001; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<header style="text-align: center; background: rgba(0, 0, 0, 0.5); color: rgb(0, 0, 0); padding: 2rem; display: flex; flex-direction: column; align-items: center; gap: 1rem;">
    <img src="https://i.pinimg.com/736x/e2/2c/ef/e22cef5fd63b77362b003a09265fda15.jpg" alt="gatito" class="cat-image">
    <h1>Beelzebub</h1>
</header>
<p style="text-align: center; font-size: 1.5rem; color: black; ">SITE EM FASE DE TESTES T-T</p>
<div class="container">
    <h2>Meus Projetos</h2>
    <div class="projects-grid">
        
    
        <div class="card">
            <h3>projeto-01</h3>
            <p>Presente para o Luiz (26/04/2025)</p>
            <button class="btn-abrir" onclick="abrirProjeto('https://belzeburra.github.io/project-01/')">Visualizar Demo</button>
        </div>

        <div class="card">
            <h3>projeto-02</h3>
            <p>Teste</p>
            <button class="btn-abrir" onclick="abrirProjeto('https://belzeburra.github.io/project-01/')">Visualizar Demo</button>
        </div>


    </div>
</div>


<div id="preview-overlay">
    <span class="close-btn" onclick="fecharProjeto()">&times; Fechar</span>
    <div id="preview-content">
        <iframe id="iframe-projeto" src=""></iframe>
    </div>
</div>

<script>
    function abrirProjeto(url) {
        const overlay = document.getElementById('preview-overlay');
        const iframe = document.getElementById('iframe-projeto');
        
        
        iframe.src = url;
        overlay.style.display = 'block';
        
       
        document.body.style.overflow = 'hidden';
    }

    function fecharProjeto() {
        const overlay = document.getElementById('preview-overlay');
        const iframe = document.getElementById('iframe-projeto');
        
      
        overlay.style.display = 'none';
        iframe.src = '';
        
      
        document.body.style.overflow = 'auto';
    }
</script>

</body>
</html>
